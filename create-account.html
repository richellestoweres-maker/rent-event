<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create Account | RentEvent</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
* { box-sizing: border-box; }

:root {
  --coral-1: #ff9a73;
  --coral-2: #ff7a63;
  --coral-3: #ff5f67;
  --white: #ffffff;
  --white-soft: rgba(255,255,255,0.9);
  --glass: rgba(255,255,255,0.14);
}

html, body {
  margin: 0;
  min-height: 100%;
  font-family: "Inter", sans-serif;
}

body {
  background: linear-gradient(180deg, var(--coral-1), var(--coral-2), var(--coral-3));
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  color: white;
}

.container {
  width: 100%;
  max-width: 400px;
}

.top-link {
  margin-bottom: 16px;
}

.top-link a {
  color: white;
  text-decoration: none;
  font-weight: 600;
}

.card {
  background: rgba(255,255,255,0.10);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 32px;
  padding: 30px 24px;
  backdrop-filter: blur(10px);
  box-shadow: 0 24px 48px rgba(167,55,61,0.25);
  text-align: center;
}

.logo-box {
  width: 70px;
  height: 70px;
  border: 3px solid white;
  border-radius: 20px;
  margin: 0 auto 20px;
  transform: rotate(8deg);
}

h1 {
  margin: 0;
  font-size: 2rem;
  font-weight: 800;
}

.subtitle {
  margin: 12px 0 24px;
  font-size: 0.95rem;
  color: var(--white-soft);
}

.form-wrap {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.input, .select {
  height: 58px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.18);
  color: white;
  padding: 0 16px;
  font-size: 0.95rem;
  font-weight: 600;
  outline: none;
}

.input::placeholder {
  color: rgba(255,255,255,0.8);
}

.input:-webkit-autofill {
  -webkit-text-fill-color: white;
  box-shadow: 0 0 0 1000px rgba(255,255,255,0.18) inset;
}

.select {
  appearance: none;
  background-image:
    linear-gradient(45deg, transparent 50%, white 50%),
    linear-gradient(135deg, white 50%, transparent 50%);
  background-position:
    calc(100% - 20px) 25px,
    calc(100% - 14px) 25px;
  background-size: 6px 6px;
  background-repeat: no-repeat;
}

.select option {
  color: #111;
}

.button {
  height: 60px;
  border-radius: 16px;
  border: none;
  background: rgba(255,255,255,0.28);
  color: white;
  font-weight: 800;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 10px;
  cursor: pointer;
  font-family: inherit;
  font-size: 1rem;
}

.error-message {
  display: none;
  margin-top: 4px;
  font-size: 0.82rem;
  color: #fff;
  background: rgba(255,255,255,0.16);
  border-radius: 14px;
  padding: 10px 12px;
  line-height: 1.4;
}

.tiny-note {
  margin-top: 16px;
  font-size: 0.8rem;
  color: rgba(255,255,255,0.85);
}

.bottom-link {
  margin-top: 20px;
  font-size: 0.95rem;
}

.bottom-link a {
  color: white;
  font-weight: 700;
  text-decoration: none;
}
</style>
</head>

<body>

<main class="container">

  <div class="top-link">
    <a href="index.html">← Back to Sign In</a>
  </div>

  <section class="card">

    <div class="logo-box"></div>

    <h1>Create Account</h1>

    <p class="subtitle">
      Start planning events, save favorites, and keep everything beautifully organized.
    </p>

    <div class="form-wrap">

      <input class="input" placeholder="Full Name">

      <input class="input" placeholder="Email Address">

      <input class="input" type="password" placeholder="Create Password">

      <select class="select" id="accountType">
        <option disabled selected value="">Select Account Type</option>
        <option value="customer">Event Planner / Customer</option>
        <option value="vendor">Vendor / Business</option>
      </select>

      <button class="button" onclick="routeAccount()">Create My Account</button>

      <div class="error-message" id="errorMessage">
        Please select an account type before continuing.
      </div>

    </div>

    <div class="tiny-note">
      Front-end only. Firebase coming next.
    </div>

    <div class="bottom-link">
      Already have an account?
      <a href="index.html">Sign In</a>
    </div>

  </section>

</main>

<script>
function routeAccount() {
  const accountType = document.getElementById("accountType").value;
  const errorMessage = document.getElementById("errorMessage");

  if (accountType === "customer") {
    window.location.href = "dashboard.html";
  } else if (accountType === "vendor") {
    window.location.href = "vendor-dashboard.html";
  } else {
    errorMessage.style.display = "block";
  }
}
</script>

</body>
</html>
