<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create Account | RentEvent</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
* { box-sizing: border-box; }

:root {
  --coral-1: #ff9a73;
  --coral-2: #ff7a63;
  --coral-3: #ff5f67;
  --white: #ffffff;
  --white-soft: rgba(255,255,255,0.9);
  --glass: rgba(255,255,255,0.14);
}

html, body {
  margin: 0;
  min-height: 100%;
  font-family: "Inter", sans-serif;
}

body {
  background: linear-gradient(180deg, var(--coral-1), var(--coral-2), var(--coral-3));
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  color: white;
}

.container {
  width: 100%;
  max-width: 400px;
}

.top-link {
  margin-bottom: 16px;
}

.top-link a {
  color: white;
  text-decoration: none;
  font-weight: 600;
}

.card {
  background: rgba(255,255,255,0.10);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 32px;
  padding: 30px 24px;
  backdrop-filter: blur(10px);
  box-shadow: 0 24px 48px rgba(167,55,61,0.25);
  text-align: center;
}

.logo-box {
  width: 70px;
  height: 70px;
  border: 3px solid white;
  border-radius: 20px;
  margin: 0 auto 20px;
  transform: rotate(8deg);
}

h1 {
  margin: 0;
  font-size: 2rem;
  font-weight: 800;
}

.subtitle {
  margin: 12px 0 24px;
  font-size: 0.95rem;
  color: var(--white-soft);
}

.form-wrap {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.input, .select {
  height: 58px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.18);
  color: white;
  padding: 0 16px;
  font-size: 0.95rem;
  font-weight: 600;
  outline: none;
}

.input::placeholder {
  color: rgba(255,255,255,0.8);
}

.input:-webkit-autofill {
  -webkit-text-fill-color: white;
  box-shadow: 0 0 0 1000px rgba(255,255,255,0.18) inset;
}

.select {
  appearance: none;
  background-image:
    linear-gradient(45deg, transparent 50%, white 50%),
    linear-gradient(135deg, white 50%, transparent 50%);
  background-position:
    calc(100% - 20px) 25px,
    calc(100% - 14px) 25px;
  background-size: 6px 6px;
  background-repeat: no-repeat;
}

.select option {
  color: #111;
}

.button {
  height: 60px;
  border-radius: 16px;
  border: none;
  background: rgba(255,255,255,0.28);
  color: white;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 10px;
  cursor: pointer;
  font-family: inherit;
  font-size: 1rem;
}

.error-message {
  display: none;
  margin-top: 4px;
  font-size: 0.82rem;
  color: #fff;
  background: rgba(255,255,255,0.16);
  border-radius: 14px;
  padding: 10px 12px;
  line-height: 1.4;
}

.tiny-note {
  margin-top: 16px;
  font-size: 0.8rem;
  color: rgba(255,255,255,0.85);
}

.bottom-link {
  margin-top: 20px;
  font-size: 0.95rem;
}

.bottom-link a {
  color: white;
  font-weight: 700;
  text-decoration: none;
}
</style>
</head>

<body>

<main class="container">

  <div class="top-link">
    <a href="index.html">← Back to Sign In</a>
  </div>

  <section class="card">

    <div class="logo-box"></div>

    <h1>Create Account</h1>

    <p class="subtitle">
      Start planning events, save favorites, and keep everything beautifully organized.
    </p>

    <div class="form-wrap">

      <input id="fullName" class="input" type="text" placeholder="Full Name">

      <input id="email" class="input" type="email" placeholder="Email Address">

      <input id="password" class="input" type="password" placeholder="Create Password">

      <select class="select" id="accountType">
        <option disabled selected value="">Select Account Type</option>
        <option value="customer">Event Planner / Customer</option>
        <option value="vendor">Vendor / Business</option>
      </select>

      <button class="button" onclick="createAccount()">Create My Account</button>

      <div class="error-message" id="errorMessage"></div>

    </div>

    <div class="tiny-note">
      Real account creation is now connected to Firebase.
    </div>

    <div class="bottom-link">
      Already have an account?
      <a href="index.html">Sign In</a>
    </div>

  </section>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBj6kPKcJUGQtfe-WYA9Q5sWRhbXHYo9NU",
  authDomain: "rent-event-f7abd.firebaseapp.com",
  projectId: "rent-event-f7abd",
  storageBucket: "rent-event-f7abd.firebasestorage.app",
  messagingSenderId: "840686040363",
  appId: "1:840686040363:web:3103c8c5b624deecee416e",
  measurementId: "G-600Z95K9GX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function showMessage(text) {
  const errorMessage = document.getElementById("errorMessage");
  errorMessage.textContent = text;
  errorMessage.style.display = "block";
}

window.createAccount = async function () {
  const fullName = document.getElementById("fullName").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const accountType = document.getElementById("accountType").value;

  if (!fullName || !email || !password || !accountType) {
    showMessage("Please fill out every field before continuing.");
    return;
  }

  if (password.length < 6) {
    showMessage("Password must be at least 6 characters.");
    return;
  }

  try {
    showMessage("Creating your account...");

    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    await updateProfile(user, {
      displayName: fullName
    });

    await setDoc(doc(db, "users", user.uid), {
      uid: user.uid,
      name: fullName,
      email: email,
      role: accountType,
      location: "",
      phone: "",
      createdAt: serverTimestamp()
    });

    if (accountType === "vendor") {
      window.location.href = "vendor-dashboard.html";
    } else {
      window.location.href = "dashboard.html";
    }

  } catch (error) {
    showMessage(error.message);
  }
};
</script>

</body>
</html>
