<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages | RentEvent</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f7f2e9;
      --card: #ffffff;
      --text: #161616;
      --muted: #6a625a;
      --line: #ece2d3;
      --soft: #f4ede2;
      --soft-2: #faf5ee;
      --coral-1: #ff9a73;
      --coral-2: #ff7a63;
      --coral-3: #ff5f67;
      --gold: #f4a43a;
      --gold-dark: #d88914;
      --green-soft: #eaf7ef;
      --green-text: #2d7a49;
      --blue-soft: #edf4ff;
      --blue-text: #4067b2;
      --red-soft: #ffe7e2;
      --red-text: #c74f4d;
      --shadow: 0 18px 40px rgba(123, 96, 58, 0.08);
      --shadow-strong: 0 18px 32px rgba(255, 108, 98, 0.18);
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 18px 112px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
    }

    .back-link,
    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #222;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(140, 111, 75, 0.05);
      flex-shrink: 0;
      font-weight: 800;
    }

    .topbar-center {
      flex: 1;
      text-align: center;
    }

    .eyebrow {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #7b7268;
      margin-bottom: 4px;
    }

    .page-title {
      margin: 0;
      font-size: 1.55rem;
      line-height: 1;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      padding: 22px 20px;
      background: linear-gradient(160deg, var(--coral-1) 0%, var(--coral-2) 52%, var(--coral-3) 100%);
      color: #fff;
      box-shadow: var(--shadow-strong);
      margin-bottom: 24px;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      right: -60px;
      top: -45px;
      background: rgba(255, 255, 255, 0.12);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 280px;
    }

    .hero-label {
      font-size: 0.88rem;
      font-weight: 600;
      opacity: 0.95;
      margin-bottom: 8px;
    }

    .hero-title {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 0.98;
      letter-spacing: -0.05em;
      font-weight: 800;
    }

    .hero-subtitle {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.95);
    }

    .search-wrap {
      margin-bottom: 22px;
    }

    .search-input {
      width: 100%;
      min-height: 56px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      padding: 0 18px;
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      box-shadow: 0 8px 20px rgba(140, 111, 75, 0.04);
    }

    .search-input::placeholder {
      color: #9f9488;
    }

    .section {
      margin-top: 28px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 1.45rem;
      line-height: 1.02;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .message-list {
      display: grid;
      gap: 14px;
    }

    .message-card {
      background: var(--card);
      border-radius: 24px;
      padding: 14px;
      box-shadow: var(--shadow);
      display: flex;
      gap: 12px;
      align-items: center;
      text-decoration: none;
      color: inherit;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .message-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 20px 42px rgba(123, 96, 58, 0.1);
    }

    .avatar {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffe7c2, #f4a43a);
      color: white;
      font-size: 1rem;
      font-weight: 800;
      position: relative;
      overflow: hidden;
    }

    .avatar::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.22);
    }

    .avatar span {
      position: relative;
      z-index: 1;
    }

    .message-content {
      min-width: 0;
      flex: 1;
    }

    .message-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 4px;
    }

    .message-name {
      margin: 0;
      font-size: 1rem;
      line-height: 1.12;
      letter-spacing: -0.02em;
      font-weight: 800;
    }

    .message-time {
      font-size: 0.76rem;
      color: #9a9084;
      font-weight: 700;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .message-preview {
      margin: 0;
      font-size: 0.88rem;
      line-height: 1.45;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .message-meta {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.76rem;
      font-weight: 700;
    }

    .pill.new {
      background: var(--red-soft);
      color: var(--red-text);
    }

    .pill.vendor {
      background: #fff4df;
      color: #aa6f12;
    }

    .pill.customer {
      background: var(--blue-soft);
      color: var(--blue-text);
    }

    .pill.system {
      background: var(--green-soft);
      color: var(--green-text);
    }

    .empty-card {
      background: var(--card);
      border-radius: 28px;
      padding: 24px 18px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .empty-icon {
      width: 64px;
      height: 64px;
      border-radius: 22px;
      margin: 0 auto 14px;
      background: #fff1dc;
      color: var(--gold-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 800;
    }

    .empty-card h3 {
      margin: 0 0 8px;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .empty-card p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .empty-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn,
    .btn-secondary {
      min-height: 46px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: inherit;
      border: none;
      padding: 0 18px;
    }

    .btn {
      background: linear-gradient(135deg, var(--coral-1) 0%, var(--coral-2) 52%, var(--coral-3) 100%);
      color: #fff;
      box-shadow: 0 14px 28px rgba(255, 107, 97, 0.16);
    }

    .btn-secondary {
      background: var(--soft-2);
      color: #4a433d;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 16px;
      width: calc(100% - 24px);
      max-width: 406px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(235, 225, 211, 0.95);
      border-radius: 999px;
      padding: 10px 8px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      box-shadow: 0 18px 38px rgba(120, 96, 60, 0.14);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .nav-item {
      min-height: 58px;
      border-radius: 999px;
      text-decoration: none;
      color: #6c655d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 0.76rem;
      font-weight: 700;
      text-align: center;
      padding: 0 4px;
    }

    .nav-item svg {
      width: 20px;
      height: 20px;
    }

    .nav-item.active {
      background: linear-gradient(135deg, var(--coral-1) 0%, var(--coral-2) 52%, var(--coral-3) 100%);
      color: #fff;
      box-shadow: 0 10px 22px rgba(255, 107, 97, 0.24);
    }

    @media (min-width: 768px) {
      body {
        padding: 24px 0;
      }

      .page {
        max-width: 960px;
      }

      .hero-content {
        max-width: 420px;
      }

      .message-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .bottom-nav {
        max-width: 520px;
      }
    }
  </style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBj6kPKcJUGQtfe-WYA9Q5sWRhbXHYo9NU",
  authDomain: "rent-event-f7abd.firebaseapp.com",
  projectId: "rent-event-f7abd",
  storageBucket: "rent-event-f7abd.firebasestorage.app",
  messagingSenderId: "840686040363",
  appId: "1:840686040363:web:3103c8c5b624deecee416e",
  measurementId: "G-600Z95K9GX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentUserData = null;
let allConversations = [];

function safeText(value, fallback = "") {
  return value && String(value).trim() ? String(value).trim() : fallback;
}

function initialsFromName(name) {
  const cleanName = safeText(name, "RE");
  const parts = cleanName.split(" ").filter(Boolean);

  if (parts.length >= 2) {
    return `${parts[0][0]}${parts[1][0]}`.toUpperCase();
  }

  return cleanName.slice(0, 2).toUpperCase();
}

function formatTime(value) {
  if (!value || !value.seconds) return "New";

  const date = new Date(value.seconds * 1000);
  const now = new Date();
  const diffMs = now - date;
  const diffMinutes = Math.floor(diffMs / 60000);
  const diffHours = Math.floor(diffMinutes / 60);
  const diffDays = Math.floor(diffHours / 24);

  if (diffMinutes < 1) return "Now";
  if (diffMinutes < 60) return `${diffMinutes} min ago`;
  if (diffHours < 24) return `${diffHours} hr ago`;
  if (diffDays === 1) return "Yesterday";
  if (diffDays < 7) return `${diffDays} days ago`;

  return date.toLocaleDateString();
}

function setText(id, value) {
  const el = document.getElementById(id);
  if (el) el.textContent = value;
}

        </svg>

      <a class="nav-item" href="add-listing.html">

          <path d="M12 5V19" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
          <path d="M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
        </svg>
        <span>Add Listing</span>
      </a>

      <a class="nav-item" href="my-listings.html">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M4 7.5C4 6.12 5.12 5 6.5 5H17.5C18.88 5 20 6.12 20 7.5V16.5C20 17.88 18.88 19 17.5 19H6.5C5.12 19 4 17.88 4 16.5V7.5Z" stroke="currentColor" stroke-width="2"></path>
          <path d="M8 10H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
          <path d="M8 14H12" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
        </svg>
        <span>Listings</span>
      </a>

      <a class="nav-item active" href="messages.html">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M7 8.5C7 6.57 8.57 5 10.5 5H17C18.1 5 19 5.9 19 7V12.5C19 14.43 17.43 16 15.5 16H12L8.2 19V16.2C7.5 15.7 7 14.87 7 14V8.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path>
          <path d="M10 9.5H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
          <path d="M10 12.5H14" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
        </svg>
        <span>Inbox</span>
      </a>
    `;
    return;
  }

  bottomNav.innerHTML = `
    <a class="nav-item" href="dashboard.html">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 10.5L12 3L21 10.5V20A1 1 0 0 1 20 21H14V14H10V21H4A1 1 0 0 1 3 20V10.5Z" fill="currentColor"></path>
      </svg>
      <span>Home</span>
    </a>

    <a class="nav-item" href="listings.html">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M4 7.5C4 6.12 5.12 5 6.5 5H17.5C18.88 5 20 6.12 20 7.5V16.5C20 17.88 18.88 19 17.5 19H6.5C5.12 19 4 17.88 4 16.5V7.5Z" stroke="currentColor" stroke-width="2"></path>
        <path d="M8 10H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
        <path d="M8 14H12" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
      </svg>
      <span>Listings</span>
    </a>

    <a class="nav-item active" href="messages.html">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M7 8.5C7 6.57 8.57 5 10.5 5H17C18.1 5 19 5.9 19 7V12.5C19 14.43 17.43 16 15.5 16H12L8.2 19V16.2C7.5 15.7 7 14.87 7 14V8.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path>
        <path d="M10 9.5H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
        <path d="M10 12.5H14" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>

      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="2"></circle>
        <path d="M5 19C5.8 16.4 8.35 14.8 12 14.8C15.65 14.8 18.2 16.4 19 19" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
      </svg>
      <span>Profile</span>
    </a>
  `;
}

function applyRoleLayout(role) {
  const backLink = document.getElementById("backLink");

  if (role === "vendor") {
    backLink.href = "vendor-dashboard.html";
    setText("roleEyebrow", "Vendor Inbox");
    setText("heroLabel", "Stay bookable");
    setText("heroSubtitle", "Reply to client questions, confirm details, and keep your booking conversations organized.");
  } else {
    backLink.href = "dashboard.html";
    setText("roleEyebrow", "Inbox");
    setText("heroLabel", "Stay connected");
    setText("heroSubtitle", "Ask questions, confirm details, and keep all your event communication in one place.");
  }

  renderBottomNav(role);
}

function renderEmptyState() {
  const messageList = document.getElementById("messageList");
  const role = currentUserData?.role || "customer";

  const primaryHref = role === "vendor" ? "my-listings.html" : "listings.html";
  const primaryText = role === "vendor" ? "View My Listings" : "Browse Listings";
  const copy = role === "vendor"
    ? "When customers message you about a listing, those conversations will appear here."
    : "When you message vendors about listings, those conversations will appear here.";

  messageList.innerHTML = `
    <div class="empty-card">
      <div class="empty-icon">✉</div>
      <h3>No messages yet</h3>
      <p>${copy}</p>
      <div class="empty-actions">
        <a class="btn" href="${primaryHref}">${primaryText}</a>
        <a class="btn-secondary" href="${role === "vendor" ? "vendor-dashboard.html" : "dashboard.html"}">Back Home</a>
      </div>
    </div>
  `;
}

function renderConversations(conversations) {
  const messageList = document.getElementById("messageList");

  if (!conversations.length) {
    renderEmptyState();
    return;
  }

  messageList.innerHTML = conversations.map((conversation) => {
    const title = safeText(conversation.title, "Conversation");
    const lastMessage = safeText(conversation.lastMessage, "No messages yet.");
    const time = formatTime(conversation.updatedAt || conversation.createdAt);
    const roleLabel = safeText(conversation.contextType, currentUserData?.role === "vendor" ? "Customer" : "Vendor");
    const initials = initialsFromName(title);
    const unreadFor = conversation.unreadFor || {};
    const isUnread = currentUser && unreadFor[currentUser.uid];

    return `
      <a class="message-card" href="chat-thread.html?id=${encodeURIComponent(conversation.id || "")}">
        <div class="avatar"><span>${initials}</span></div>

        <div class="message-content">
          <div class="message-top">
            <h3 class="message-name">${title}</h3>
            <span class="message-time">${time}</span>
          </div>

          <p class="message-preview">${lastMessage}</p>

          <div class="message-meta">
            ${isUnread ? `<span class="pill new">New</span>` : ""}
            <span class="pill ${roleLabel.toLowerCase().includes("customer") ? "customer" : "vendor"}">${roleLabel}</span>
          </div>
        </div>
      </a>
    `;
  }).join("");
}

function applySearch() {
  const searchInput = document.getElementById("searchInput");
  const queryText = searchInput.value.trim().toLowerCase();

  if (!queryText) {
    renderConversations(allConversations);
    return;
  }

  const filtered = allConversations.filter((conversation) => {
    const searchable = [
      conversation.title,
      conversation.lastMessage,
      conversation.contextType,
      conversation.listingTitle
    ].join(" ").toLowerCase();

    return searchable.includes(queryText);
  });

  renderConversations(filtered);
}

async function loadConversations(user) {
  const messageList = document.getElementById("messageList");

  try {
    const conversationsRef = collection(db, "conversations");
    const conversationsQuery = query(conversationsRef, where("participantIds", "array-contains", user.uid));
    const snapshot = await getDocs(conversationsQuery);

    const conversations = [];

    snapshot.forEach((docSnap) => {
      conversations.push({
        id: docSnap.id,
        ...docSnap.data()
      });
    });

    conversations.sort((a, b) => {
      const aTime = a.updatedAt && a.updatedAt.seconds ? a.updatedAt.seconds : 0;
      const bTime = b.updatedAt && b.updatedAt.seconds ? b.updatedAt.seconds : 0;
      return bTime - aTime;
    });

    allConversations = conversations;
    renderConversations(allConversations);

  } catch (error) {
    messageList.innerHTML = `
      <div class="empty-card">
        <div class="empty-icon">!</div>
        <h3>Could not load messages</h3>
        <p>${error.message}</p>
        <div class="empty-actions">
          <a class="btn" href="${currentUserData?.role === "vendor" ? "vendor-dashboard.html" : "dashboard.html"}">Back Home</a>
        </div>
      </div>
    `;
  }
}

document.getElementById("searchInput").addEventListener("input", applySearch);

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  const userRef = doc(db, "users", user.uid);
  const userSnap = await getDoc(userRef);

  if (!userSnap.exists()) {
    window.location.href = "index.html";
    return;
  }

  currentUser = user;
  currentUserData = userSnap.data();

  applyRoleLayout(currentUserData.role);
  loadConversations(user);
});
</script>

</body>
