<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Listing</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f7f2e9;
}

.container {
  max-width: 430px;
  margin: auto;
  padding: 20px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h2 {
  margin: 0;
}

/* FORM */
.form {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.input, .textarea, .select {
  width: 100%;
  padding: 14px;
  border-radius: 18px;
  border: none;
  background: white;
  font-size: 15px;
}

.textarea {
  min-height: 100px;
}

/* BUTTON */
.button {
  margin-top: 10px;
  padding: 14px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(135deg, #ff7a5c, #ff5c5c);
  color: white;
  font-size: 16px;
  text-align: center;
  text-decoration: none;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 400px;
  background: white;
  border-radius: 30px;
  display: flex;
  justify-content: space-around;
  padding: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h2>Add Listing</h2>
    <a href="vendor-dashboard.html">←</a>
  </div>

  <div class="form">

    <input class="input" placeholder="Business / Listing Name">

    <select class="select">
      <option>Select Category</option>
      <option>Bounce Houses</option>
      <option>Photo Booth</option>
      <option>Decor</option>
      <option>Catering</option>
      <option>Venue</option>
    </select>

    <input class="input" placeholder="Starting Price (ex: $250)">

    <textarea class="textarea" placeholder="Describe your service..."></textarea>

    <input class="input" placeholder="Location (City, TX)">

    <a href="vendor-dashboard.html" class="button">Publish Listing</a>

  </div>

</div>

<div class="nav">
  <a href="vendor-dashboard.html">Home</a>
  <b>Add</b>
  <a href="messages.html">Inbox</a>
  <a href="profile.html">Profile</a>
</div>

</body>
</html>
