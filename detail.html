<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunny Slides</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f7f2e9;
}

.container {
  max-width: 430px;
  margin: auto;
  padding-bottom: 100px;
}

/* IMAGE */
.hero-img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

/* CONTENT */
.content {
  padding: 20px;
  background: white;
  border-radius: 30px 30px 0 0;
  margin-top: -30px;
}

h1 {
  margin: 0;
}

.price {
  font-weight: bold;
  margin: 10px 0;
}

.rating {
  color: #f4a43a;
}

/* SECTION */
.section {
  margin-top: 20px;
}

/* BUTTON */
.button {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 400px;
  padding: 15px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(135deg, #ff7a5c, #ff5c5c);
  color: white;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">

  <img class="hero-img" src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">

  <div class="content">

    <h1>Sunny Slides</h1>
    <div class="rating">★★★★★</div>
    <div class="price">$250+</div>

    <div class="section">
      <p>
        Premium bounce house rentals perfect for birthdays, backyard parties,
        and celebrations. Clean, modern, and kid-friendly setups.
      </p>
    </div>

    <div class="section">
      <h3>What’s Included</h3>
      <ul>
        <li>Bounce house setup</li>
        <li>Delivery + pickup</li>
        <li>Safety inspection</li>
      </ul>
    </div>

    <div class="section">
      <h3>Location</h3>
      <p>League City, TX</p>
    </div>

  </div>

</div>

<button class="button">Add to Event</button>

</body>
</html>
