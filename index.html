<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RentEvent Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
* { box-sizing: border-box; }

:root {
  --coral-1: #ff9a73;
  --coral-2: #ff7a63;
  --coral-3: #ff5f67;
  --white: #ffffff;
  --white-soft: rgba(255, 255, 255, 0.9);
  --glass: rgba(255, 255, 255, 0.14);
  --shadow: 0 24px 48px rgba(167, 55, 61, 0.22);
}

html, body {
  margin: 0;
  min-height: 100%;
  font-family: "Inter", sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg, var(--coral-1), var(--coral-2), var(--coral-3));
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--white);
  padding: 24px;
}

.container {
  width: 100%;
  max-width: 390px;
}

.card {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 34px;
  padding: 30px 24px;
  backdrop-filter: blur(10px);
  box-shadow: var(--shadow);
  text-align: center;
}

.logo-box {
  width: 84px;
  height: 84px;
  margin: 0 auto 20px;
  border: 3px solid white;
  border-radius: 22px;
  transform: rotate(8deg);
}

h1 {
  margin: 0;
  font-size: 2.35rem;
  font-weight: 800;
}

.tagline {
  margin: 10px 0 30px;
  font-size: 0.8rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--white-soft);
}

.form-wrap {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.input, .select {
  min-height: 58px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.14);
  background: var(--glass);
  color: white;
  padding: 0 16px;
  font-size: 1rem;
  outline: none;
}

.input::placeholder {
  color: rgba(255,255,255,0.8);
}

.select {
  appearance: none;
}

.select option {
  color: #111;
}

.button {
  min-height: 60px;
  border-radius: 18px;
  border: none;
  background: rgba(255,255,255,0.25);
  color: white;
  font-weight: 700;
  cursor: pointer;
}

.error {
  display: none;
  font-size: 0.85rem;
  margin-top: 5px;
}

.link {
  margin-top: 18px;
}

.bottom {
  margin-top: 24px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="logo-box"></div>

    <h1>RentEvent</h1>
    <div class="tagline">PLAN. RENT. CELEBRATE.</div>

    <div class="form-wrap">
      <input class="input" placeholder="Email">
      <input class="input" type="password" placeholder="Password">

      <!-- NEW -->
      <select class="select" id="loginType">
        <option disabled selected value="">Select Login Type</option>
        <option value="customer">Event Planner / Customer</option>
        <option value="vendor">Vendor / Business</option>
      </select>

      <!-- UPDATED -->
      <button class="button" onclick="login()">Sign In</button>

      <div class="error" id="error">Please select account type</div>
    </div>

    <div class="link">
      <a href="forgot-password.html">Forgot Password?</a>
    </div>

    <div class="bottom">
      <a href="create-account.html">Create Account</a>
      ·
      <a href="dashboard.html">Continue as Guest</a>
    </div>

  </div>
</div>

<script>
function login() {
  const type = document.getElementById("loginType").value;
  const error = document.getElementById("error");

  if (type === "customer") {
    window.location.href = "dashboard.html";
  } else if (type === "vendor") {
    window.location.href = "vendor-dashboard.html";
  } else {
    error.style.display = "block";
  }
}
</script>

</body>
</html>
