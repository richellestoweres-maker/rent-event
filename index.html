<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RentEvent Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Inter", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #ff8c69 0%, #ff6b5f 45%, #ff5a63 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      padding: 24px;
    }

    .screen {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 100%;
      text-align: center;
    }

    .logo-mark {
      width: 86px;
      height: 86px;
      margin: 0 auto 22px;
      position: relative;
      transform: rotate(-8deg);
    }

    .logo-mark::before,
    .logo-mark::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 22px;
      border: 3px solid rgba(255, 255, 255, 0.95);
    }

    .logo-mark::before {
      transform: rotate(0deg);
    }

    .logo-mark::after {
      transform: rotate(18deg);
      opacity: 0.9;
    }

    .brand {
      font-size: 2.5rem;
      line-height: 1;
      font-weight: 700;
      margin: 0 0 10px;
      letter-spacing: -0.04em;
    }

    .tagline {
      margin: 0 0 44px;
      font-size: 0.85rem;
      letter-spacing: 0.35em;
      font-weight: 600;
      opacity: 0.95;
      text-transform: uppercase;
    }

    .field {
      width: 100%;
      height: 62px;
      border: 1.5px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      padding: 0 18px;
      color: #ffffff;
      font-size: 1rem;
      outline: none;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      margin-bottom: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .field::placeholder {
      color: rgba(255, 255, 255, 0.82);
    }

    .signin-btn {
      width: 100%;
      height: 64px;
      margin-top: 14px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.08));
      color: #ffffff;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 16px 28px rgba(173, 51, 61, 0.22);
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .signin-btn:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .forgot {
      display: inline-block;
      margin-top: 16px;
      color: rgba(255, 255, 255, 0.92);
      text-decoration: none;
      font-size: 0.98rem;
      font-weight: 500;
    }

    .bottom-links {
      margin-top: 22px;
      font-size: 0.98rem;
      color: rgba(255, 255, 255, 0.92);
      line-height: 1.5;
    }

    .bottom-links a {
      color: #ffffff;
      text-decoration: none;
      font-weight: 500;
    }

    @media (min-width: 768px) {
      .screen {
        min-height: auto;
      }

      .login-wrap {
        max-width: 430px;
      }
    }
  </style>
</head>
<body>
  <main class="screen">
    <section class="login-wrap">
      <div class="logo-mark" aria-hidden="true"></div>

      <h1 class="brand">RentEvent</h1>
      <p class="tagline">Plan. Rent. Celebrate.</p>

      <form>
        <input class="field" type="email" placeholder="Email" />
        <input class="field" type="password" placeholder="Password" />

        <button class="signin-btn" type="button">Sign In</button>
      </form>

      <a class="forgot" href="#">Forgot Password?</a>

      <div class="bottom-links">
        <a href="#">Create Account</a>
        &nbsp;&middot;&nbsp;
        <a href="#">Continue as Guest</a>
      </div>
    </section>
  </main>
</body>
</html>
