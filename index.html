<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RentEvent Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
* { box-sizing: border-box; }

:root {
  --coral-1: #ff9a73;
  --coral-2: #ff7a63;
  --coral-3: #ff5f67;
  --white: #ffffff;
  --white-soft: rgba(255, 255, 255, 0.9);
  --glass: rgba(255, 255, 255, 0.14);
  --shadow: 0 24px 48px rgba(167, 55, 61, 0.22);
  --dark: #161616;
  --muted: #6a625a;
  --line: #ece2d3;
  --cream: #faf5ee;
  --green-soft: #eaf7ef;
  --green-text: #2d7a49;
  --red-soft: #ffe7e2;
  --red-text: #c74f4d;
}

html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  font-family: "Inter", sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg, var(--coral-1) 0%, var(--coral-2) 48%, var(--coral-3) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--white);
  padding: 24px;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: "";
  position: fixed;
  top: -100px;
  right: -80px;
  width: 240px;
  height: 240px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.12);
  pointer-events: none;
}

body::after {
  content: "";
  position: fixed;
  bottom: -120px;
  left: -70px;
  width: 260px;
  height: 260px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.08);
  pointer-events: none;
}

.container {
  width: 100%;
  max-width: 390px;
  position: relative;
  z-index: 1;
}

.card {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 34px;
  padding: 30px 24px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: var(--shadow);
  text-align: center;
}

.logo-box {
  width: 84px;
  height: 84px;
  margin: 0 auto 20px;
  border: 3px solid rgba(255, 255, 255, 0.96);
  border-radius: 22px;
  transform: rotate(8deg);
  position: relative;
}

.logo-box::after {
  content: "";
  position: absolute;
  inset: 18px;
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.16);
}

h1 {
  margin: 0;
  font-size: 2.35rem;
  line-height: 1;
  letter-spacing: -0.05em;
  font-weight: 800;
}

.tagline {
  margin-top: 10px;
  margin-bottom: 34px;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--white-soft);
}

.form-wrap {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.input {
  width: 100%;
  min-height: 60px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.14);
  background: var(--glass);
  color: var(--white);
  font-size: 1rem;
  font-family: inherit;
  padding: 0 18px;
  outline: none;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.input::placeholder {
  color: rgba(255,255,255,0.82);
}

.input:-webkit-autofill,
.input:-webkit-autofill:hover,
.input:-webkit-autofill:focus {
  -webkit-text-fill-color: white;
  box-shadow: 0 0 0 1000px rgba(255,255,255,0.14) inset;
  transition: background-color 9999s ease-in-out 0s;
}

.button,
.secondary-button {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 62px;
  padding: 0 18px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--white);
  font-size: 1.02rem;
  font-weight: 700;
  margin-top: 8px;
  text-decoration: none;
  cursor: pointer;
  font-family: inherit;
}

.button {
  background: rgba(255,255,255,0.22);
  box-shadow: var(--shadow);
}

.secondary-button {
  background: rgba(255,255,255,0.12);
}

.message {
  display: none;
  margin-top: 10px;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.14);
  color: white;
  font-size: 0.84rem;
  line-height: 1.4;
}

.message.success {
  background: rgba(234, 247, 239, 0.22);
}

.message.error {
  background: rgba(255, 231, 226, 0.22);
}

.link {
  margin-top: 18px;
  font-size: 0.95rem;
}

.link button,
.link a {
  color: var(--white);
  text-decoration: none;
  font-weight: 600;
  background: none;
  border: none;
  font-family: inherit;
  cursor: pointer;
  font-size: 0.95rem;
  padding: 0;
}

.bottom {
  margin-top: 24px;
  font-size: 0.95rem;
  line-height: 1.7;
  color: rgba(255,255,255,0.95);
}

.bottom a {
  color: var(--white);
  text-decoration: none;
  font-weight: 700;
}

.divider {
  margin: 0 8px;
  opacity: 0.8;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(22, 22, 22, 0.44);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 18px;
  z-index: 20;
}

.modal-overlay.show {
  display: flex;
}

.modal-card {
  width: 100%;
  max-width: 390px;
  background: #fff;
  color: var(--dark);
  border-radius: 30px;
  padding: 22px;
  box-shadow: 0 24px 70px rgba(22, 22, 22, 0.24);
}

.modal-label {
  display: inline-flex;
  min-height: 28px;
  padding: 0 10px;
  border-radius: 999px;
  align-items: center;
  justify-content: center;
  background: #fff4df;
  color: #8d5f11;
  font-size: 0.76rem;
  font-weight: 800;
  margin-bottom: 12px;
}

.modal-title {
  margin: 0 0 8px;
  font-size: 1.45rem;
  line-height: 1.05;
  letter-spacing: -0.04em;
  font-weight: 800;
}

.modal-text {
  margin: 0 0 16px;
  color: var(--muted);
  font-size: 0.92rem;
  line-height: 1.45;
}

.modal-input {
  width: 100%;
  min-height: 56px;
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 0 15px;
  font-family: inherit;
  font-size: 0.96rem;
  background: var(--cream);
  color: var(--dark);
  outline: none;
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 14px;
}

.modal-btn,
.modal-btn-secondary {
  min-height: 50px;
  border-radius: 999px;
  border: none;
  font-size: 0.92rem;
  font-weight: 800;
  font-family: inherit;
  cursor: pointer;
  flex: 1;
}

.modal-btn {
  background: linear-gradient(135deg, var(--coral-1), var(--coral-2), var(--coral-3));
  color: #fff;
}

.modal-btn-secondary {
  background: var(--cream);
  color: #4a433d;
}

.modal-status {
  display: none;
  margin-top: 12px;
  border-radius: 16px;
  padding: 11px 12px;
  font-size: 0.84rem;
  font-weight: 700;
  line-height: 1.4;
}

.modal-status.success {
  display: block;
  background: var(--green-soft);
  color: var(--green-text);
}

.modal-status.error {
  display: block;
  background: var(--red-soft);
  color: var(--red-text);
}

@media (max-height: 720px) {
  body {
    align-items: flex-start;
    overflow-y: auto;
  }
}
</style>
</head>

<body>
  <main class="container">
    <section class="card">
      <div class="logo-box" aria-hidden="true"></div>

      <h1>RentEvent</h1>
      <div class="tagline">Plan. Rent. Celebrate.</div>

      <div class="form-wrap">
        <input id="email" class="input" type="email" placeholder="Email" autocomplete="email" />
        <input id="password" class="input" type="password" placeholder="Password" autocomplete="current-password" />

        <button class="button" id="loginBtn" onclick="login()">Sign In</button>

        <div id="message" class="message"></div>
      </div>

      <div class="link">
        <button type="button" id="forgotPasswordBtn">Forgot Password?</button>
      </div>

      <div class="bottom">
        <a href="create-account.html">Create Account</a>
        <span class="divider">·</span>
        <a href="dashboard.html">Continue as Guest</a>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="forgotPasswordModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="forgotPasswordTitle">
      <div class="modal-label">Account Help</div>

      <h2 class="modal-title" id="forgotPasswordTitle">Reset your password</h2>
      <p class="modal-text">
        Enter the email connected to your RentEvent account. We’ll send a secure password reset link.
      </p>

      <input id="resetEmail" class="modal-input" type="email" placeholder="Email address" autocomplete="email" />

      <div id="resetStatus" class="modal-status"></div>

      <div class="modal-actions">
        <button class="modal-btn-secondary" type="button" id="closeResetBtn">Cancel</button>
        <button class="modal-btn" type="button" id="sendResetBtn">Send Link</button>
      </div>
    </div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBj6kPKcJUGQtfe-WYA9Q5sWRhbXHYo9NU",
  authDomain: "rent-event-f7abd.firebaseapp.com",
  projectId: "rent-event-f7abd",
  storageBucket: "rent-event-f7abd.firebasestorage.app",
  messagingSenderId: "840686040363",
  appId: "1:840686040363:web:3103c8c5b624deecee416e",
  measurementId: "G-600Z95K9GX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function showMessage(text, type = "") {
  const message = document.getElementById("message");
  message.textContent = text;
  message.className = type ? `message ${type}` : "message";
  message.style.display = "block";
}

function showResetStatus(text, type = "success") {
  const status = document.getElementById("resetStatus");
  status.textContent = text;
  status.className = `modal-status ${type}`;
  status.style.display = "block";
}

function getDashboardForUser(userData) {
  const role = userData.role || "customer";

  if (role === "admin") {
    return "admin-dashboard.html";
  }

  if (role === "vendor") {
    return "vendor-dashboard.html";
  }

  if (role === "planner" || userData.plannerPro === true) {
    return "planner-dashboard.html";
  }

  return "dashboard.html";
}

async function routeUser(user) {
  const userRef = doc(db, "users", user.uid);
  const userSnap = await getDoc(userRef);

  if (!userSnap.exists()) {
    showMessage("Account found, but profile data is missing. Please contact support.", "error");
    return;
  }

  const userData = userSnap.data();
  window.location.href = getDashboardForUser(userData);
}

window.login = async function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const loginBtn = document.getElementById("loginBtn");

  if (!email || !password) {
    showMessage("Please enter your email and password.", "error");
    return;
  }

  try {
    loginBtn.disabled = true;
    loginBtn.textContent = "Signing In...";
    showMessage("Signing you in...");

    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    await routeUser(userCredential.user);

  } catch (error) {
    showMessage(error.message, "error");
  } finally {
    loginBtn.disabled = false;
    loginBtn.textContent = "Sign In";
  }
};

function openForgotPasswordModal() {
  const modal = document.getElementById("forgotPasswordModal");
  const email = document.getElementById("email").value.trim();

  document.getElementById("resetEmail").value = email;
  document.getElementById("resetStatus").style.display = "none";

  modal.classList.add("show");
  modal.setAttribute("aria-hidden", "false");
}

function closeForgotPasswordModal() {
  const modal = document.getElementById("forgotPasswordModal");

  modal.classList.remove("show");
  modal.setAttribute("aria-hidden", "true");
}

async function sendResetLink() {
  const email = document.getElementById("resetEmail").value.trim();
  const sendBtn = document.getElementById("sendResetBtn");

  if (!email) {
    showResetStatus("Please enter your email address first.", "error");
    return;
  }

  try {
    sendBtn.disabled = true;
    sendBtn.textContent = "Sending...";

    await sendPasswordResetEmail(auth, email);

    showResetStatus("Password reset email sent. Check your inbox and spam folder.", "success");
  } catch (error) {
    showResetStatus(error.message, "error");
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = "Send Link";
  }
}

document.getElementById("forgotPasswordBtn").addEventListener("click", openForgotPasswordModal);
document.getElementById("closeResetBtn").addEventListener("click", closeForgotPasswordModal);
document.getElementById("sendResetBtn").addEventListener("click", sendResetLink);

document.getElementById("forgotPasswordModal").addEventListener("click", (event) => {
  if (event.target.id === "forgotPasswordModal") {
    closeForgotPasswordModal();
  }
});

document.addEventListener("keydown", (event) => {
  if (event.key === "Enter") {
    const modalOpen = document.getElementById("forgotPasswordModal").classList.contains("show");

    if (modalOpen) {
      sendResetLink();
    } else {
      window.login();
    }
  }

  if (event.key === "Escape") {
    closeForgotPasswordModal();
  }
});
</script>

</body>
</html>
