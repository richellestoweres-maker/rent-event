<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentEvent Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(180deg, #ff8c69, #ff5a63);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.container {
  width: 90%;
  max-width: 360px;
  text-align: center;
}

.logo-box {
  width: 80px;
  height: 80px;
  border: 3px solid white;
  border-radius: 20px;
  margin: 0 auto 20px;
  transform: rotate(10deg);
}

h1 {
  margin: 0;
  font-size: 34px;
}

.tagline {
  letter-spacing: 3px;
  font-size: 13px;
  margin-bottom: 40px;
}

.input {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  border: none;
  margin-bottom: 12px;
  background: rgba(255,255,255,0.25);
  color: white;
  font-size: 16px;
}

.input::placeholder {
  color: rgba(255,255,255,0.8);
}

.button {
  display: block;
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  border: none;
  background: linear-gradient(180deg, #ff7a5c, #ff5c5c);
  color: white;
  font-size: 18px;
  margin-top: 20px;
  text-decoration: none;
}

.link {
  margin-top: 15px;
  font-size: 14px;
}

.link a {
  color: white;
  text-decoration: none;
}

.bottom {
  margin-top: 20px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo-box"></div>

  <h1>RentEvent</h1>
  <div class="tagline">PLAN. RENT. CELEBRATE.</div>

  <input class="input" placeholder="Email">
  <input class="input" placeholder="Password">

  <a href="dashboard.html" class="button">Sign In</a>

  <div class="link">
    <a href="#">Forgot Password?</a>
  </div>

  <div class="bottom">
    Create Account · Continue as Guest
  </div>

</div>

</body>
</html>
