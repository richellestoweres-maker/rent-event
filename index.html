<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RentEvent Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --coral-1: #ff9a73;
      --coral-2: #ff7a63;
      --coral-3: #ff5f67;
      --white: #ffffff;
      --white-soft: rgba(255, 255, 255, 0.88);
      --glass: rgba(255, 255, 255, 0.16);
      --glass-strong: rgba(255, 255, 255, 0.22);
      --shadow: 0 24px 48px rgba(167, 55, 61, 0.22);
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Inter", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, var(--coral-1) 0%, var(--coral-2) 48%, var(--coral-3) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: -100px;
      right: -80px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      bottom: -120px;
      left: -70px;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 380px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .logo-wrap {
      margin-bottom: 24px;
    }

    .logo-box {
      width: 84px;
      height: 84px;
      margin: 0 auto 20px;
      position: relative;
      transform: rotate(8deg);
    }

    .logo-box::before,
    .logo-box::after {
      content: "";
      position: absolute;
      inset: 0;
      border: 3px solid rgba(255, 255, 255, 0.96);
      border-radius: 22px;
    }

    .logo-box::after {
      transform: rotate(18deg);
      opacity: 0.88;
    }

    h1 {
      margin: 0;
      font-size: 2.35rem;
      line-height: 1;
      letter-spacing: -0.05em;
      font-weight: 800;
    }

    .tagline {
      margin-top: 10px;
      margin-bottom: 40px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--white-soft);
    }

    .form-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .input {
      width: 100%;
      min-height: 60px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: var(--glass);
      color: var(--white);
      font-size: 1rem;
      font-family: inherit;
      padding: 0 18px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .input::placeholder {
      color: rgba(255, 255, 255, 0.82);
    }

    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 62px;
      padding: 0 18px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: var(--glass-strong);
      color: var(--white);
      font-size: 1.06rem;
      font-weight: 700;
      margin-top: 10px;
      text-decoration: none;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .link {
      margin-top: 16px;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .link a {
      color: var(--white);
      text-decoration: none;
      opacity: 0.95;
    }

    .link a:hover {
      opacity: 1;
    }

    .bottom {
      margin-top: 24px;
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.95);
      line-height: 1.6;
    }

    .bottom a {
      color: var(--white);
      text-decoration: none;
      font-weight: 600;
    }

    .divider {
      margin: 0 8px;
      opacity: 0.8;
    }

    @media (min-width: 768px) {
      .container {
        max-width: 420px;
      }

      h1 {
        font-size: 2.7rem;
      }

      .tagline {
        font-size: 0.84rem;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="logo-wrap">
      <div class="logo-box" aria-hidden="true"></div>
      <h1>RentEvent</h1>
      <div class="tagline">Plan. Rent. Celebrate.</div>
    </div>

    <div class="form-wrap">
      <input class="input" type="email" placeholder="Email" />
      <input class="input" type="password" placeholder="Password" />

      <a href="dashboard.html" class="button">Sign In</a>
    </div>

    <div class="link">
      <a href="messages.html">Forgot Password?</a>
    </div>

    <div class="bottom">
      <a href="profile.html">Create Account</a>
      <span class="divider">·</span>
      <a href="dashboard.html">Continue as Guest</a>
    </div>
  </main>
</body>
</html>
