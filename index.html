<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RentEvent Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
* { box-sizing: border-box; }

:root {
  --coral-1: #ff9a73;
  --coral-2: #ff7a63;
  --coral-3: #ff5f67;
  --white: #ffffff;
  --white-soft: rgba(255, 255, 255, 0.9);
  --glass: rgba(255, 255, 255, 0.14);
  --shadow: 0 24px 48px rgba(167, 55, 61, 0.22);
}

html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  font-family: "Inter", sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg, var(--coral-1) 0%, var(--coral-2) 48%, var(--coral-3) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--white);
  padding: 24px;
  overflow: hidden;
  position: relative;
}

body::before {
  content: "";
  position: fixed;
  top: -100px;
  right: -80px;
  width: 240px;
  height: 240px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.12);
  pointer-events: none;
}

body::after {
  content: "";
  position: fixed;
  bottom: -120px;
  left: -70px;
  width: 260px;
  height: 260px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.08);
  pointer-events: none;
}

.container {
  width: 100%;
  max-width: 390px;
  position: relative;
  z-index: 1;
}

.card {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 34px;
  padding: 30px 24px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: var(--shadow);
  text-align: center;
}

.logo-box {
  width: 84px;
  height: 84px;
  margin: 0 auto 20px;
  border: 3px solid rgba(255, 255, 255, 0.96);
  border-radius: 22px;
  transform: rotate(8deg);
}

h1 {
  margin: 0;
  font-size: 2.35rem;
  line-height: 1;
  letter-spacing: -0.05em;
  font-weight: 800;
}

.tagline {
  margin-top: 10px;
  margin-bottom: 34px;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--white-soft);
}

.form-wrap {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.input {
  width: 100%;
  min-height: 60px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.14);
  background: var(--glass);
  color: var(--white);
  font-size: 1rem;
  font-family: inherit;
  padding: 0 18px;
  outline: none;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.input::placeholder {
  color: rgba(255,255,255,0.82);
}

.input:-webkit-autofill,
.input:-webkit-autofill:hover,
.input:-webkit-autofill:focus {
  -webkit-text-fill-color: white;
  box-shadow: 0 0 0 1000px rgba(255,255,255,0.14) inset;
  transition: background-color 9999s ease-in-out 0s;
}

.button {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 62px;
  padding: 0 18px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.22);
  color: var(--white);
  font-size: 1.02rem;
  font-weight: 700;
  margin-top: 8px;
  text-decoration: none;
  box-shadow: var(--shadow);
  cursor: pointer;
  font-family: inherit;
}

.message {
  display: none;
  margin-top: 10px;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.14);
  color: white;
  font-size: 0.84rem;
  line-height: 1.4;
}

.link {
  margin-top: 18px;
  font-size: 0.95rem;
}

.link a {
  color: var(--white);
  text-decoration: none;
  font-weight: 500;
}

.bottom {
  margin-top: 24px;
  font-size: 0.95rem;
  line-height: 1.7;
  color: rgba(255,255,255,0.95);
}

.bottom a {
  color: var(--white);
  text-decoration: none;
  font-weight: 700;
}

.divider {
  margin: 0 8px;
  opacity: 0.8;
}
</style>
</head>

<body>
  <main class="container">
    <section class="card">
      <div class="logo-box" aria-hidden="true"></div>

      <h1>RentEvent</h1>
      <div class="tagline">Plan. Rent. Celebrate.</div>

      <div class="form-wrap">
        <input id="email" class="input" type="email" placeholder="Email" />
        <input id="password" class="input" type="password" placeholder="Password" />

        <button class="button" onclick="login()">Sign In</button>

        <div id="message" class="message"></div>
      </div>

      <div class="link">
        <a href="forgot-password.html">Forgot Password?</a>
      </div>

      <div class="bottom">
        <a href="create-account.html">Create Account</a>
        <span class="divider">·</span>
        <a href="dashboard.html">Continue as Guest</a>
      </div>
    </section>
  </main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBj6kPKcJUGQtfe-WYA9Q5sWRhbXHYo9NU",
  authDomain: "rent-event-f7abd.firebaseapp.com",
  projectId: "rent-event-f7abd",
  storageBucket: "rent-event-f7abd.firebasestorage.app",
  messagingSenderId: "840686040363",
  appId: "1:840686040363:web:3103c8c5b624deecee416e",
  measurementId: "G-600Z95K9GX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function showMessage(text) {
  const message = document.getElementById("message");
  message.textContent = text;
  message.style.display = "block";
}

window.login = async function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    showMessage("Please enter your email and password.");
    return;
  }

  try {
    showMessage("Signing you in...");

    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);

    if (!userSnap.exists()) {
      showMessage("Account found, but profile data is missing. Please contact support.");
      return;
    }

    const userData = userSnap.data();

    if (userData.role === "vendor") {
      window.location.href = "vendor-dashboard.html";
    } else {
      window.location.href = "dashboard.html";
    }

  } catch (error) {
    showMessage(error.message);
  }
};
</script>

</body>
</html>
