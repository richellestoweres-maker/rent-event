<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentEvent</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(180deg, #ff7a5c, #ff5c5c);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.container {
    width: 90%;
    max-width: 350px;
    text-align: center;
}

.logo {
    font-size: 42px;
    font-weight: 600;
    margin-bottom: 10px;
}

.tagline {
    letter-spacing: 3px;
    font-size: 14px;
    margin-bottom: 40px;
    opacity: 0.9;
}

.input-box {
    background: rgba(255,255,255,0.3);
    border-radius: 16px;
    padding: 15px;
    margin-bottom: 15px;
}

.input-box input {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 16px;
    outline: none;
    color: white;
}

.input-box input::placeholder {
    color: rgba(255,255,255,0.8);
}

.button {
    background: linear-gradient(180deg, #ff7a5c, #ff5c5c);
    border: none;
    border-radius: 16px;
    padding: 16px;
    width: 100%;
    font-size: 18px;
    color: white;
    margin-top: 20px;
    cursor: pointer;
}

.link {
    margin-top: 15px;
    font-size: 14px;
    opacity: 0.9;
}

.link a {
    color: white;
    text-decoration: none;
}

.bottom-links {
    margin-top: 20px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">RentEvent</div>
    <div class="tagline">PLAN. RENT. CELEBRATE.</div>

    <div class="input-box">
        <input type="email" placeholder="Email">
    </div>

    <div class="input-box">
        <input type="password" placeholder="Password">
    </div>

    <button class="button">Sign In</button>

    <div class="link">
        <a href="#">Forgot Password?</a>
    </div>

    <div class="bottom-links">
        Create Account · Continue as Guest
    </div>

</div>

</body>
</html>
