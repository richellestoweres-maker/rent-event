<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | RentEvent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    * { box-sizing: border-box; }

    :root {
      --coral-1: #ff9a73;
      --coral-2: #ff7a63;
      --coral-3: #ff5f67;
      --white: #ffffff;
      --white-soft: rgba(255, 255, 255, 0.9);
      --glass: rgba(255, 255, 255, 0.14);
      --shadow: 0 24px 48px rgba(167, 55, 61, 0.22);
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Inter", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, var(--coral-1) 0%, var(--coral-2) 48%, var(--coral-3) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: -110px;
      right: -90px;
      width: 250px;
      height: 250px;
      border-radius: 50%;
      background: rgba(255,255,255,0.11);
    }

    body::after {
      content: "";
      position: fixed;
      bottom: -130px;
      left: -80px;
      width: 270px;
      height: 270px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }

    .container {
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }

    .top-link {
      margin-bottom: 16px;
    }

    .top-link a {
      color: var(--white);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 34px;
      padding: 30px 24px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }

    .logo-box {
      width: 78px;
      height: 78px;
      margin: 0 auto 20px;
      position: relative;
      transform: rotate(8deg);
    }

    .logo-box::before,
    .logo-box::after {
      content: "";
      position: absolute;
      inset: 0;
      border: 3px solid rgba(255,255,255,0.96);
      border-radius: 22px;
    }

    .logo-box::after {
      transform: rotate(18deg);
      opacity: 0.88;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: 2rem;
      line-height: 1;
      letter-spacing: -0.05em;
      font-weight: 800;
    }

    .subtitle {
      margin: 12px 0 24px;
      text-align: center;
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--white-soft);
    }

    .form-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .input {
      width: 100%;
      min-height: 58px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.14);
      background: var(--glass);
      color: var(--white);
      font-size: 0.98rem;
      font-family: inherit;
      padding: 0 16px;
      outline: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .input::placeholder {
      color: rgba(255,255,255,0.82);
    }

    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 60px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.22);
      color: var(--white);
      font-size: 1rem;
      font-weight: 700;
      margin-top: 8px;
      text-decoration: none;
      box-shadow: var(--shadow);
    }

    .tiny-note {
      margin-top: 16px;
      text-align: center;
      font-size: 0.82rem;
      line-height: 1.5;
      color: rgba(255,255,255,0.86);
    }

    .bottom-link {
      margin-top: 20px;
      text-align: center;
      font-size: 0.95rem;
      color: var(--white-soft);
    }

    .bottom-link a {
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="top-link">
      <a href="index.html">← Back to Sign In</a>
    </div>

    <section class="card">
      <div class="logo-box" aria-hidden="true"></div>

      <h1>Forgot Password</h1>
      <p class="subtitle">
        Enter your email and we’ll send you a reset link once real authentication is connected.
      </p>

      <div class="form-wrap">
        <input class="input" type="email" placeholder="Email Address" />
        <a href="index.html" class="button">Send Reset Link</a>
      </div>

      <div class="tiny-note">
        This is still the front-end version. Later this page will send real password reset emails through Firebase.
      </div>

      <div class="bottom-link">
        Remembered your password?
        <a href="index.html">Sign In</a>
      </div>
    </section>
  </main>
</body>
</html>
