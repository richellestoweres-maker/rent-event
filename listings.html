<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentEvent Listings</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f7f2e9;
}

.container {
  max-width: 430px;
  margin: auto;
  padding: 20px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h2 {
  margin: 0;
}

/* SEARCH */
.search {
  margin: 15px 0;
}

.search input {
  width: 100%;
  padding: 14px;
  border-radius: 20px;
  border: none;
  background: white;
}

/* CATEGORY SCROLL */
.categories {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  margin-bottom: 15px;
}

.categories div {
  background: #f4a43a;
  color: white;
  padding: 8px 15px;
  border-radius: 20px;
  white-space: nowrap;
  font-size: 14px;
}

/* LISTINGS */
.listings {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.card {
  background: white;
  border-radius: 20px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

.card-content h3 {
  margin: 0;
}

.price {
  font-weight: bold;
  margin: 5px 0;
}

.button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(135deg, #ff7a5c, #ff5c5c);
  color: white;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 400px;
  background: white;
  border-radius: 30px;
  display: flex;
  justify-content: space-around;
  padding: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h2>Listings</h2>
    <div>🔍</div>
  </div>

  <div class="search">
    <input placeholder="Search vendors, rentals, etc...">
  </div>

  <div class="categories">
    <div>Venues</div>
    <div>Bounce Houses</div>
    <div>Photo Booths</div>
    <div>Decor</div>
    <div>Chefs</div>
  </div>

  <div class="listings">

    <div class="card">
  <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
  <div class="card-content">
    <h3>Sunny Slides</h3>
    <div class="price">$250+</div>
    <a href="detail.html" class="button">View Details</a>
  </div>
</div>

<div class="card">
  <img src="https://images.unsplash.com/photo-1555244162-803834f70033">
  <div class="card-content">
    <h3>Luxury Dinner Setup</h3>
    <div class="price">$850+</div>
    <a href="detail.html" class="button">View Details</a>
  </div>
</div>

<div class="card">
  <img src="https://images.unsplash.com/photo-1505751172876-fa1923c5c528">
  <div class="card-content">
    <h3>Photo Booth Experience</h3>
    <div class="price">$225+</div>
    <a href="detail.html" class="button">View Details</a>
  </div>
</div>

  </div>

</div>

<div class="nav">
  <div><a href="dashboard.html">Home</a></div>
  <div><b>Listings</b></div>
  <div>Inbox</div>
  <div>Profile</div>
</div>

</body>
</html>
