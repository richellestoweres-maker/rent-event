const app = initializeApp(firebaseConfig);

let currentUser = null;
let currentUserData = null;
let allConversations = [];

function safeText(value, fallback = "") {
  return value && String(value).trim() ? String(value).trim() : fallback;
}

function escapeHtml(value) {
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatTime(value) {
  if (!value || !value.seconds) return "New";

  const date = new Date(value.seconds * 1000);
  const now = new Date();
  const diffMs = now - date;
  const diffMinutes = Math.floor(diffMs / 60000);
  const diffHours = Math.floor(diffMinutes / 60);
  const diffDays = Math.floor(diffHours / 24);

  if (diffMinutes < 1) return "Now";
  if (diffMinutes < 60) return `${diffMinutes} min ago`;
  if (diffHours < 24) return `${diffHours} hr ago`;
  if (diffDays === 1) return "Yesterday";
  if (diffDays < 7) return `${diffDays} days ago`;

  return date.toLocaleDateString();
}

function getOtherParticipantName(conversation) {
  const participantNames = conversation.participantNames || {};
  const otherIds = (conversation.participantIds || []).filter((id) => id !== currentUser.uid);
  const otherId = otherIds[0];

  if (otherId && participantNames[otherId]) {
    return participantNames[otherId];
  }

  return safeText(conversation.title, "Conversation");
}

function renderEmptyState() {
  const list = document.getElementById("notificationList");
  const role = currentUserData?.role || "customer";
  const href = role === "vendor" ? "vendor-dashboard.html" : "listings.html";
  const label = role === "vendor" ? "Back to Dashboard" : "Browse Listings";

  list.innerHTML = `
    <div class="empty-card">
      <div class="empty-icon">✓</div>
      <h3>No notifications yet</h3>
      <p>You’re all caught up. New messages and updates will appear here.</p>
      <div class="empty-actions">
        <a class="btn" href="${href}">${label}</a>
        <a class="btn-secondary" href="messages.html">Open Inbox</a>
      </div>
    </div>
  `;
}

function renderNotifications(conversations) {
  const list = document.getElementById("notificationList");
  const sectionTitle = document.getElementById("sectionTitle");

  if (!conversations.length) {
    sectionTitle.textContent = "Recent Activity";
    renderEmptyState();
    return;
  }

  const unreadCount = conversations.filter((conversation) => {
    const unreadFor = conversation.unreadFor || {};
    return !!unreadFor[currentUser.uid];
  }).length;

  sectionTitle.textContent = unreadCount
    ? `${unreadCount} Unread Alert${unreadCount === 1 ? "" : "s"}`
    : "Recent Activity";

  list.innerHTML = conversations.map((conversation) => {
    const unreadFor = conversation.unreadFor || {};
    const isUnread = !!unreadFor[currentUser.uid];

    const otherName = getOtherParticipantName(conversation);
    const listingTitle = safeText(conversation.listingTitle, "Event listing");
    const lastMessage = safeText(conversation.lastMessage, "Conversation updated.");
    const updatedAt = conversation.updatedAt || conversation.createdAt;
    const time = formatTime(updatedAt);
    const conversationId = encodeURIComponent(conversation.id || "");

    const title = isUnread
      ? `New message from ${otherName}`
      : `Message thread with ${otherName}`;

    const text = `${lastMessage} Related to ${listingTitle}.`;

    return `
      <a class="notification-card ${isUnread ? "unread" : ""}" href="chat-thread.html?id=${conversationId}">
        <div class="notification-icon ${isUnread ? "icon-coral" : "icon-blue"}">✉</div>

        <div class="notification-content">
          <div class="notification-top">
            <h3 class="notification-title">${escapeHtml(title)}</h3>
            <span class="notification-time">${escapeHtml(time)}</span>
          </div>

          <p class="notification-text">
            ${escapeHtml(text)}
          </p>

          <div class="notification-meta">
            ${isUnread ? `<span class="pill new">Unread</span>` : `<span class="pill message">Message</span>`}
            <span class="pill info">${escapeHtml(listingTitle)}</span>
          </div>
        </div>
      </a>
    `;
  }).join("");
}

async function loadNotifications(user) {
  try {
    const conversationsRef = collection(db, "conversations");
    const conversationsQuery = query(conversationsRef, where("participantIds", "array-contains", user.uid));
    const snapshot = await getDocs(conversationsQuery);

    const conversations = [];

    snapshot.forEach((docSnap) => {
      conversations.push({
        id: docSnap.id,
        ...docSnap.data()
      });
    });

    conversations.sort((a, b) => {
      const aUnread = a.unreadFor && a.unreadFor[user.uid] ? 1 : 0;
      const bUnread = b.unreadFor && b.unreadFor[user.uid] ? 1 : 0;

      if (aUnread !== bUnread) {
        return bUnread - aUnread;
      }

      const aTime = a.updatedAt && a.updatedAt.seconds ? a.updatedAt.seconds : 0;
      const bTime = b.updatedAt && b.updatedAt.seconds ? b.updatedAt.seconds : 0;
      return bTime - aTime;
    });

    allConversations = conversations;
    renderNotifications(allConversations);

  } catch (error) {
    document.getElementById("notificationList").innerHTML = `
      <div class="empty-card">
        <div class="empty-icon">!</div>
        <h3>Could not load notifications</h3>
        <p>${escapeHtml(error.message)}</p>
        <div class="empty-actions">
          <a class="btn" href="messages.html">Open Inbox</a>
        </div>
      </div>
    `;
  }
}

async function clearUnread() {
  if (!currentUser || !allConversations.length) return;

  const clearBtn = document.getElementById("clearUnreadBtn");
  clearBtn.disabled = true;
  clearBtn.textContent = "Clearing...";

  try {
    const unreadConversations = allConversations.filter((conversation) => {
      const unreadFor = conversation.unreadFor || {};
      return !!unreadFor[currentUser.uid];
    });

    for (const conversation of unreadConversations) {
      const updatedUnreadFor = {
        ...(conversation.unreadFor || {})
      };

      delete updatedUnreadFor[currentUser.uid];

      await updateDoc(doc(db, "conversations", conversation.id), {
        unreadFor: updatedUnreadFor
      });
    }

    await loadNotifications(currentUser);

  } catch (error) {
    alert(error.message);
  } finally {
    clearBtn.disabled = false;
    clearBtn.textContent = "Clear Unread";
  }
}

document.getElementById("clearUnreadBtn").addEventListener("click", clearUnread);

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  currentUser = user;

  const userRef = doc(db, "users", user.uid);
  const userSnap = await getDoc(userRef);

  if (!userSnap.exists()) {
    window.location.href = "index.html";
    return;
  }

  currentUserData = userSnap.data();

  applyRoleLayout(currentUserData.role);
  loadNotifications(user);
});
</script>
