<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RentEvent Event Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f7f2e9;
      --card: #ffffff;
      --text: #161616;
      --muted: #6a625a;
      --line: #ece2d3;
      --soft: #f5ede2;
      --coral-1: #ff9a73;
      --coral-2: #ff7a63;
      --coral-3: #ff5f67;
      --gold: #f4a43a;
      --gold-dark: #e78e18;
      --shadow: 0 18px 40px rgba(123, 96, 58, 0.08);
      --shadow-strong: 0 18px 32px rgba(255, 108, 98, 0.18);
      --radius-xl: 34px;
      --radius-lg: 28px;
      --radius-md: 22px;
      --radius-sm: 18px;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 18px 112px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
    }

    .back-link,
    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #222;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(140, 111, 75, 0.05);
      flex-shrink: 0;
    }

    .topbar-center {
      flex: 1;
      text-align: center;
    }

    .eyebrow {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #7b7268;
      margin-bottom: 4px;
    }

    .page-title {
      margin: 0;
      font-size: 1.55rem;
      line-height: 1;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .hero-card {
      background: linear-gradient(160deg, var(--coral-1) 0%, var(--coral-2) 52%, var(--coral-3) 100%);
      border-radius: var(--radius-xl);
      padding: 22px 20px;
      color: #fff;
      box-shadow: var(--shadow-strong);
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      right: -60px;
      top: -40px;
      background: rgba(255, 255, 255, 0.12);
    }
